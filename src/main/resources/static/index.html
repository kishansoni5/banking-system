<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Management System</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->

    <header>
        <h1>🏦 Banking Management System</h1>
    </header>

    <!-- ========================= -->
    <!-- MESSAGE AREA -->
    <!-- ========================= -->

    <div id="message"></div>

    <!-- ========================= -->
    <!-- LOGIN SECTION -->
    <!-- ========================= -->

    <section id="login-section">

        <h2>Login</h2>

        <input
                type="text"
                id="username"
                placeholder="Username">

        <input
                type="password"
                id="password"
                placeholder="Password">

        <button id="loginBtn">
            Login
        </button>

    </section>

    <!-- ========================= -->
    <!-- DASHBOARD -->
    <!-- Hidden until login -->
    <!-- ========================= -->

    <section id="dashboard" class="hidden">

        <h2>Dashboard</h2>

        <div id="loggedInUser">
            Username :
            <span id="loggedUsername"></span>

            |

            Role :
            <span id="loggedRole"></span>
        </div>

        <hr>

        <!-- ===================== -->
        <!-- ACCOUNT -->
        <!-- ===================== -->

        <div class="card">

            <h3>Account</h3>

            <input
                    type="text"
                    id="accountId"
                    placeholder="Account ID">

            <button id="loadAccountBtn">
                Load Account
            </button>

            <button id="balanceBtn">
                Check Balance
            </button>

            <h3>

                Current Balance :

                ₹ <span id="balance">0</span>

            </h3>

        </div>

        <!-- ===================== -->
        <!-- DEPOSIT -->
        <!-- ===================== -->

        <div class="card">

            <h3>Deposit</h3>

            <input
                    type="number"
                    id="depositAmount"
                    placeholder="Amount">

            <button id="depositBtn">

                Deposit

            </button>

        </div>

        <!-- ===================== -->
        <!-- WITHDRAW -->
        <!-- ===================== -->

        <div class="card">

            <h3>Withdraw</h3>

            <input
                    type="number"
                    id="withdrawAmount"
                    placeholder="Amount">

            <button id="withdrawBtn">

                Withdraw

            </button>

        </div>

        <!-- ===================== -->
        <!-- TRANSFER -->
        <!-- ===================== -->

        <div class="card">

            <h3>Transfer</h3>

            <input
                    type="text"
                    id="targetAccountId"
                    placeholder="Target Account ID">

            <input
                    type="number"
                    id="transferAmount"
                    placeholder="Amount">

            <button id="transferBtn">

                Transfer

            </button>

        </div>

        <!-- ===================== -->
        <!-- TRANSACTIONS -->
        <!-- ===================== -->

        <div class="card">

            <h3>Transactions</h3>

            <table>

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Type</th>

                    <th>Amount</th>

                    <th>Date</th>

                </tr>

                </thead>

                <tbody id="transactionTable">

                </tbody>

            </table>

            <br>

            <button id="previousBtn">

                Previous

            </button>

            <button id="nextBtn">

                Next

            </button>

        </div>

    </section>

    <script src="js/config.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/account.js"></script>

    <script src="js/transaction.js"></script>

    <script src="js/app.js"></script>

</body>
</html>
